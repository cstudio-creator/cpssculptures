<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lodestone drawings, 2010</title>
  <link rel="icon" type="image/png" href="favicon.jpg">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #e5e5e5;
      font-family: Arial, sans-serif;
    }

    .wrapper {
      max-width: 750px;
      margin: 0 auto;
      padding: 2rem 1rem;
      text-align: center;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 1rem;
      font-weight: normal;
    }

    p.description {
      font-size: 1.15rem;
      max-width: 600px;
      margin: 2rem auto 3rem auto;
      line-height: 1.5;
      color: #444;
    }

    .image-column {
      display: flex;
      flex-direction: column;
      gap: 64px;
      align-items: center;
    }

    .image-column figure {
      margin: 0;
      padding: 0;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .image-column img {
      width: 78%;
      height: auto;
      display: block;
    }

    footer {
      text-align: center;
      margin-top: 4rem;
      padding-bottom: 2rem;
      font-size: 0.9rem;
      color: #333;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <h1>lodestone drawings, 2010</h1>

    <p class="description">
      Collecting of drawings done on a computer and paper. They encapsulate the idea of these sculpture drawings being a kind of lodestone on the metaphysical journey of life.
    </p>

    <div class="image-column">
      <figure><img src="images/lodestone-01.jpg" alt="lodestone drawing 1"></figure>
      <figure><img src="images/lodestone-02.jpg" alt="lodestone drawing 2"></figure>
      <figure><img src="images/lodestone-03.jpg" alt="lodestone drawing 3"></figure>
      <figure><img src="images/lodestone-04.jpg" alt="lodestone drawing 4"></figure>
      <figure><img src="images/lodestone-05.jpg" alt="lodestone drawing 5"></figure>
      <figure><img src="images/lodestone-06a.jpg" alt="lodestone drawing 6"></figure>
    </div>

  </div>

</body>
</html>
